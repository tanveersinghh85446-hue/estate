<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f4f4f4;
    padding: 20px;
}

.container{
    width: 100%;
    max-width: 500px;
    background: #fff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

h1{
    text-align: center;
    margin-bottom: 25px;
    color: #333;
}

form{
    display: flex;
    flex-direction: column;
    gap: 15px;
}

input,
textarea{
    width: 100%;
    padding: 12px 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 16px;
    outline: none;
}

input:focus,
textarea:focus{
    border-color: #007bff;
}

textarea{
    min-height: 140px;
    resize: vertical;
}

button{
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #007bff;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover{
    background: #0056b3;
}

/* Tablet */
@media (max-width: 768px){
    .container{
        max-width: 90%;
        padding: 25px;
    }
}

/* Mobile */
@media (max-width: 480px){
    .container{
        max-width: 100%;
        padding: 20px;
    }

    h1{
        font-size: 26px;
    }

    input,
    textarea,
    button{
        font-size: 14px;
    }
}
</style>

</head>
<body>

<div class="container">
    <h1>Contact Us</h1>

    <form>
        <input type="text" placeholder="Your Name" required>

        <input type="email" placeholder="Your Email" required>

        <textarea placeholder="Your Message" required></textarea>

        <button type="submit">Send Message</button>
    </form>
</div>

</body>
</html>
